system:
  seed: 42
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  memory_optimize:
    enable: true
    min_memory_gb: 4
    max_memory_gb: 16
    cleaning_threshold_gb: 12

data:
  paths:
    raw_user_data: 'data/raw/tianchi_fresh_comp_train_user_2w.csv'
    raw_item_data: 'data/raw/tianchi_fresh_comp_train_item_2w.csv'
    processed_data_dir: 'data/processed'
    output_dir: 'data/output'
    checkpoint_dir: 'data/checkpoints'
    log_dir: 'logs'
  features:
    # Categorical features that get a LabelEncoder + Embedding
    categorical:
      - user_id
      - item_id
      - category
    sequence:
      max_length: 50
      num_behaviors: 5   # behavior_type in {1,2,3,4}, 0 reserved for padding
      behavior_dim: 8
    user:
      categorical: ['user_id']
      numerical: []
      embedding_dim: 32
    item:
      categorical: ['item_id', 'category']
      numerical: []
      embedding_dim: 32

features:
  time_windows: [1, 3, 7, 14]
  behavior_types: [1, 2, 3, 4]
  chunk_size: 1000000
  memory_optimize: true
  save_dir: 'data/processed/features'
  user_features:
    enable_behavior_count: true
    enable_category_preference: true
    enable_time_based: true
  item_features:
    enable_behavior_count: true
    enable_user_stats: true
    enable_time_based: true
  processing:
    batch_size: 100000
    n_jobs: -1

device:
  accelerator: 'auto'   # 'gpu' | 'cpu' | 'auto'
  devices: 'auto'
  strategy: 'auto'
  precision: 32         # bump to 16 if GPU supports it

model:
  architecture:
    embedding_dim: 32
    hidden_dims: [128, 64, 32]
    dropout: 0.2
    num_attention_heads: 4
    num_transformer_layers: 2
    transformer_ff_dim: 128
  training:
    batch_size: 512
    num_epochs: 5
    learning_rate: 0.001
    weight_decay: 0.0001
    negative_sampling_ratio: 4   # number of negatives per positive
    negative_sampling_strategy: 'popularity'   # 'uniform' | 'popularity'
    negative_sampling_alpha: 0.75              # word2vec-style smoothing on item counts
    use_in_batch_negatives: false              # add InfoNCE auxiliary loss
    infonce_temperature: 0.1
    infonce_weight: 0.1                        # blend weight for the InfoNCE term
    inference_history_days: 7                  # candidate-set lookback at predict time
    early_stopping:
      patience: 3
      min_delta: 0.001
    optimization:
      accumulate_grad_batches: 1
      gradient_clip_val: 1.0
      cudnn_benchmark: true
    scheduler:
      type: 'cosine'
      T_max: 5
      eta_min: 0.000001

training:
  train_end_date: '2014-12-18'
  pred_date: '2014-12-19'
  validation_days: 1
  top_k: 20
  enable_memory_optimize: true
  gc_collect_interval: 2
  memory_limit_gb: 16
  save_checkpoints: true
  checkpoint_interval: 5

logging:
  level: 'INFO'
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: 'logs/recommender.log'
  enable_memory_logging: true
  memory_log_interval: 1000
  log_feature_info: true
